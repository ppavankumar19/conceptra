name: Security Scan

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────
  # Python dependency audit
  # ──────────────────────────────────────────
  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit backend dependencies
        working-directory: backend
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln PYSEC-2022-42969 \
            --format json \
            --output pip-audit-report.json || true
          pip-audit -r requirements.txt \
            --ignore-vuln PYSEC-2022-42969

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: backend/pip-audit-report.json
          retention-days: 30

  # ──────────────────────────────────────────
  # Flutter / Dart dependency check
  # ──────────────────────────────────────────
  flutter-outdated:
    name: Flutter Dependency Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Get packages
        working-directory: frontend
        run: flutter pub get

      - name: Check for outdated packages
        working-directory: frontend
        run: flutter pub outdated

      - name: Check for known vulnerabilities (dart pub audit)
        working-directory: frontend
        run: dart pub audit || true

  # ──────────────────────────────────────────
  # Docker image vulnerability scan (Trivy)
  # ──────────────────────────────────────────
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image for scanning
        run: docker build -t eduviz-backend-scan:latest ./backend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: eduviz-backend-scan:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # Don't fail; upload report for review

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ──────────────────────────────────────────
  # CodeQL static analysis
  # ──────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      matrix:
        language: [python]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
