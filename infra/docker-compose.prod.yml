version: "3.9"

networks:
  conceptra-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  flutter_web_build:

services:
  postgres:
    image: postgres:15-alpine
    container_name: conceptra-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-conceptra}
      POSTGRES_USER: ${POSTGRES_USER:-conceptra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - conceptra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conceptra} -d ${POSTGRES_DB:-conceptra}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: conceptra-redis-prod
    volumes:
      - redis_data:/data
    networks:
      - conceptra-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: conceptra-backend-prod
    env_file:
      - .env.prod
    networks:
      - conceptra-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      gunicorn app.main:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 4
      --bind 0.0.0.0:8000
      --timeout 120
      --keep-alive 5
      --log-level info
      --access-logfile -
      --error-logfile -
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: conceptra-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/${DOMAIN}/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/${DOMAIN}/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - flutter_web_build:/usr/share/nginx/html:ro
    networks:
      - conceptra-network
    depends_on:
      - backend
    restart: unless-stopped
