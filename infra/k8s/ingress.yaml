apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eduviz-ingress
  namespace: eduviz
  labels:
    app.kubernetes.io/name: eduviz
    app.kubernetes.io/component: ingress
  annotations:
    # cert-manager — automatically provision a Let's Encrypt certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # NGINX ingress controller
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting (requests per second per IP)
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    # Proxy timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Body size
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Security headers (applied at ingress level)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - eduviz.app
        - www.eduviz.app
      secretName: eduviz-tls-cert
  rules:
    # API traffic → backend service
    - host: eduviz.app
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # Frontend / catch-all → frontend service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
    # www redirect handled by the ingress controller rewrite or a separate rule
    - host: www.eduviz.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
