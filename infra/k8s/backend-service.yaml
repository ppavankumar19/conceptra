apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: eduviz
  labels:
    app.kubernetes.io/name: eduviz
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: eduviz-backend
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: http
