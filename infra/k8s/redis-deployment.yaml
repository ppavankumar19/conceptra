apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: eduviz
  labels:
    app.kubernetes.io/name: eduviz
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eduviz-redis
  strategy:
    type: Recreate   # Avoid two Redis pods writing to the same volume
  template:
    metadata:
      labels:
        app: eduviz-redis
        app.kubernetes.io/name: eduviz
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999   # redis user in official image
        fsGroup: 999

      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP

          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --appendonly
            - "yes"
            - --save
            - "60 1"

          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eduviz-secrets
                  key: REDIS_PASSWORD

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          volumeMounts:
            - name: redis-data
              mountPath: /data

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: eduviz
  labels:
    app.kubernetes.io/name: eduviz
    app.kubernetes.io/component: redis
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: eduviz
  labels:
    app.kubernetes.io/name: eduviz
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app: eduviz-redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: redis
